<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO Form</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .error { color: #dc3545; font-size: 14px; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1 th:text="${todoId != null} ? 'Edit TODO' : 'New TODO'">TODO Form</h1>

    <form th:action="${todoId != null} ? @{/todos/{id}(id=${todoId})} : @{/todos}"
          th:object="${todoRequest}" method="post">

        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" th:field="*{title}" maxlength="200" required>
            <div th:if="${#fields.hasErrors('title')}" class="error">
                <p th:each="err : ${#fields.errors('title')}" th:text="${err}">Error</p>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" maxlength="1000"></textarea>
        </div>

        <div class="form-group" th:if="${todoId != null}">
            <label>
                <input type="checkbox" th:field="*{completed}"> Completed
            </label>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/todos}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</body>
</html>
